worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Map file extension to correct Content-Type for proxied responses
    # (Nginx only auto-sets types for static files, not proxied content)
    map $uri $s3_content_type {
        ~*\.js$     "application/javascript";
        ~*\.mjs$    "application/javascript";
        ~*\.wasm$   "application/wasm";
        ~*\.gltf$   "model/gltf+json";
        ~*\.glb$    "model/gltf-binary";
        ~*\.json$   "application/json";
        ~*\.css$    "text/css";
        ~*\.html$   "text/html; charset=utf-8";
        ~*\.htm$    "text/html; charset=utf-8";
        ~*\.png$    "image/png";
        ~*\.jpg$    "image/jpeg";
        ~*\.jpeg$   "image/jpeg";
        ~*\.gif$    "image/gif";
        ~*\.svg$    "image/svg+xml";
        ~*\.xml$    "application/xml";
        ~*\.bin$    "application/octet-stream";
        ~*\.hdr$    "application/octet-stream";
        default     "application/octet-stream";
    }

    # Enable gzip compression for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml model/gltf+json;
    gzip_min_length 256;

    # Proxy cache — caches S3 responses on disk
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=s3_cache:10m max_size=1g inactive=30d;

    # Upstream with keepalive — reuse connections to S3 instead of 40 new ones
    upstream mega_s3 {
        server s3.ca-west-1.s4.mega.io:443;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy Verge3D / HTML sites from Mega.io S3
        # URL: /s3/{path} -> S3 bucket media-server/media/{path}
        location /s3/ {
            # Proxy to Mega.io S3 via keepalive upstream
            proxy_pass https://mega_s3/zmpni4dc5ddtxqzz45a2bt3xx5gutzpebvopo/edustart-media-server/media-server/media/;

            # DNS resolver for upstream
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            # Required for HTTPS upstream + keepalive
            proxy_http_version 1.1;
            proxy_set_header Host s3.ca-west-1.s4.mega.io;
            proxy_set_header Connection "";
            proxy_ssl_server_name on;

            # Hide S3 headers
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;

            # Remove S3's wrong Content-Type and set our own from the map
            proxy_hide_header Content-Type;
            add_header Content-Type $s3_content_type always;

            # Browser caching: 30 days for all assets
            add_header Cache-Control "public, max-age=2592000" always;

            # CORS and framing
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Frame-Options "SAMEORIGIN" always;

            # Proxy cache on disk
            proxy_cache s3_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;

            # Buffer sizes for large files
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
