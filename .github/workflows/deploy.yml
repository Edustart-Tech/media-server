name: Build and Deploy Docker images for Prod

on:
  push:
    branches: ["main"]

jobs:
  build-and-push-dockerfile-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            edustartech/edustartech:media-server
          platforms: linux/amd64,linux/arm64
    
  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push-dockerfile-image   # Waits until build job succeeds
    steps:
      - name: SSH into server and pull the latest image
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_KEY }}
          script: |
            docker pull edustartech/edustartech:media-server

      - name: Trigger Dokploy Deployment
        run: |
          curl -X 'POST' \
          'http://153.92.1.56:3000/api/deploy/compose/RT5AID_MCFHCZ8dglINXl' \
          -H 'accept: application/json' \
          -H 'Authorization: Bearer NavarnLhhFpfIAeBLCRqpltNJJADuBwXzZWxHTruxVsrxsDAvjZMNeUMMMoCrksX' \
          -H 'Content-Type: application/json' \
          -d '{
              "json":{
                  "applicationId": "app-mediaserver-vbjuw9"
              }
          }'
